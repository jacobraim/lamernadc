<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#3E0A0A"/>

  <!-- Simplified figure mark for small sizes -->
  <!-- Head -->
  <circle cx="16" cy="9" r="3" fill="none" stroke="#D4AE78" stroke-width="1.2"/>

  <!-- Bodice (simplified grid block) -->
  <rect x="11" y="13" width="10" height="9" rx="1" fill="none" stroke="#D4AE78" stroke-width="1.1"/>
  <!-- Grid lines inside bodice -->
  <line x1="14" y1="13" x2="14" y2="22" stroke="#D4AE78" stroke-width="0.6"/>
  <line x1="18" y1="13" x2="18" y2="22" stroke="#D4AE78" stroke-width="0.6"/>
  <line x1="11" y1="16.5" x2="21" y2="16.5" stroke="#D4AE78" stroke-width="0.6"/>
  <line x1="11" y1="19.5" x2="21" y2="19.5" stroke="#D4AE78" stroke-width="0.6"/>

  <!-- Flower stem + bloom -->
  <line x1="16" y1="22" x2="16" y2="27" stroke="#D4AE78" stroke-width="1.1"/>
  <circle cx="16" cy="28.5" r="2.5" fill="none" stroke="#D4AE78" stroke-width="1.1"/>
  <circle cx="16" cy="28.5" r="0.8" fill="#D4AE78"/>
</svg>
